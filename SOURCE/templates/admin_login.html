<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول  </title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card auth-card">
            <div class="page-title">
                <h1>تسجيل الدخول للوحة التحكم</h1>
                <p>ادخل بياناتك للوصول للوحة التحكم</p>
            </div>

            {% if error %}
                <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="styled-form">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" name="password" required>
                </div>

                <button type="submit" class="primary-btn full-width">دخول</button>
            </form>

            <div class="page-actions center-actions">
                <a href="/" class="secondary-link">العودة للرئيسية</a>
            </div>
        </div>
    </div>
</body>
</html>
