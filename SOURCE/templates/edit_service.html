<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الخدمة</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <div class="page-title">
                <h1>تعديل الخدمة</h1>
                <p>يمكنك تعديل بيانات الخدمة ثم حفظ التحديثات</p>
            </div>

            {% if error %}
                <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="styled-form">
                <div class="form-group">
                    <label>اسم الخدمة</label>
                    <input type="text" name="service_name" value="{{ service['service_name'] }}" required>
                </div>

                <div class="form-group">
                    <label>وصف الخدمة</label>
                    <textarea name="service_description" required>{{ service['service_description'] }}</textarea>
                </div>

                <div class="form-group">
                    <label>المستندات المطلوبة</label>
                    <textarea name="required_documents" required>{{ service['required_documents'] }}</textarea>
                </div>

                <div class="form-group">
                    <label>الخطوات</label>
                    <textarea name="steps" required>{{ service['steps'] }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>الرسوم</label>
                        <input type="text" id="fees" name="fees" value="{{ service['fees'] }}" required>
                        <small id="fees-error" style="color: red; display: none;">
                            يجب إدخال رقم فقط
                        </small>
                    </div>

                    <div class="form-group">
                        <label>الوقت المقدر</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="estimated_time" name="estimated_time" value="{{ service['estimated_time'] }}" required style="flex: 1;">

                            <select id="estimated_time_unit" name="estimated_time_unit" style="flex: 1;">
                                <option value="">اختر الوحدة</option>
                                <option value="دقيقة" {% if service['estimated_time_unit'] == 'دقيقة' %}selected{% endif %}>دقيقة</option>
                                <option value="ساعة" {% if service['estimated_time_unit'] == 'ساعة' %}selected{% endif %}>ساعة</option>
                                <option value="يوم" {% if service['estimated_time_unit'] == 'يوم' %}selected{% endif %}>يوم</option>
                            </select>
                        </div>
                        <small id="estimated-time-error" style="color: red; display: none;">
                            يجب إدخال رقم فقط
                        </small>
                        <small id="estimated-time-unit-error" style="color: red; display: none;">
                            يجب اختيار وحدة الوقت
                        </small>
                    </div>
                </div>

                <div class="form-group">
                    <label>رابط الخدمة</label>
                    <input type="text" name="service_link" value="{{ service['service_link'] or '' }}">
                </div>

                <div class="form-group">
                    <label>رابط تطبيق الآيفون</label>
                    <input type="text" name="ios_link" value="{{ service['ios_link'] or '' }}">
                </div>

                <div class="form-group">
                    <label>رابط تطبيق الأندرويد</label>
                    <input type="text" name="android_link" value="{{ service['android_link'] or '' }}">
                </div>

                <div class="form-group">
                    <label>رابط الفيديو</label>
                    <input type="text" name="video_link" value="{{ service['video_link'] or '' }}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>التصنيف</label>
                        <input type="text" name="category" value="{{ service['category'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>اسم الـ Intent</label>
                        <input type="text" name="intent_name" value="{{ service['intent_name'] }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>الكلمات المفتاحية</label>
                    <input type="text" name="keywords" value="{{ service['keywords'] }}" required>
                </div>

                <div class="page-actions">
                    <button type="submit" class="primary-btn">حفظ التعديلات</button>
                    <a href="/admin/services" class="secondary-link">العودة لإدارة الخدمات</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/service_validation.js"></script>
    
</body>
</html>
